# Thin wrapper so `mypy` CLI discovers config without needing `pyproject.toml`
# path flags. Canonical settings live in the root pyproject.toml [tool.mypy].
[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True
pretty = True
exclude = (?x)(
    \.venv
    | venv
    | node_modules
    | \.nx
    | dist
    | build
    | coverage
    | reports
    | migrations/versions
  )

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-scripts.tests.*]
disallow_untyped_defs = False

[mypy-migrations.*]
ignore_errors = True
