# Root tool configuration for the monorepo.
# Runtime Python packages live in apps/*/pyproject.toml and libs/*/pyproject.toml.

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
  \.venv
  | venv
  | node_modules
  | \.nx
  | dist
  | build
  | coverage
  | reports
  | migrations/versions
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true
show_error_codes = true
pretty = true
exclude = [
  "(\\.venv|venv|node_modules|\\.nx|dist|build|coverage|reports|migrations/versions)/",
]

# Tests may use untyped fixtures/helpers without polluting production code gates.
[[tool.mypy.overrides]]
module = ["tests.*", "scripts.tests.*"]
disallow_untyped_defs = false

# Alembic env and generated revisions are operational scripts.
[[tool.mypy.overrides]]
module = ["migrations.*", "env"]
disallow_untyped_defs = false
ignore_errors = true
